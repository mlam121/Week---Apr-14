<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transitions & Transforms Practice</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2em;
      background-color: #f8f8f8;
      color: #333;
    }

    h1 {
      text-align: center;
    }

    .button {
      display: inline-block;
      padding: 1em 2em;
      margin: 1em;
      background-color: #9dc3e6;
      border-radius: 8px;
      text-decoration: none;
      color: white;
      font-weight: bold;
    }

    .card {
      background-color: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      box-shadow: 2px 2px 4px rgba(0,0,0,0.1);
      padding: 1em;
      width: 200px;
      margin: 1em;
      text-align: center;
      display: inline-block;
    }

    img {
      width: 100%;
      border-radius: 8px;
    }

    /* ✨ Add your transition and transform effects below this line ✨ */
.color-box {
background-color: white;
border: 2px solid #333;
padding: 30px 20px;
text-align: center;
border-radius: 10px;
cursor: pointer;
transition-delay: .2s;
}

    /* Adding fun exaggerated effects */
a:hover {
    background-color: pink;
    box-shadow: 4px 4px 6px rgba(0,0,0,0.3);
    transition: rotate(180deg) scale(1.5);
    transition-duration: 0.7s  ;
    transform: rotate(775deg) scale(3);
}
.rotate-box:hover {
    transform: rotate(180deg);
    transition: transform 0.5s ease-in-out;
}
  </style>
</head>
<body>
  <h1>Transitions & Transforms Practice</h1>

  <a href="#" class="button">Hover Me</a>
  <a href="#" class="button">Click Me</a>

  <div class="card">
    <img src="https://placecats.com/200/150" alt="Cat">
    <h3>Card Title</h3>
    <p>Try adding a hover effect!</p>
  </div>

  <div class="card">
    <img src="https://placebear.com/200/150" alt="Bear">
    <h3>Another Card</h3>
    <p>Make me spin or scale up!</p>
  </div>
</body>
</html>
